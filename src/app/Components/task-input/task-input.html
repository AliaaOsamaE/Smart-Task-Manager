<section>
  <h2>Add New Task</h2>

  <form>
    <label>Task Title</label>
    <input type="text" name="title" [(ngModel)]="title">

    <textarea name="description" [(ngModel)]="description"></textarea>

    <select name="priority" [(ngModel)]="priority">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <input type="date" name="date" [(ngModel)]="date">

    <button type="button" (click)="addTask()">Add Task</button>
  </form>
</section>
