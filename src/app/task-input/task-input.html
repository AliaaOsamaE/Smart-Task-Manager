<section>
  <h2>Add New Task</h2>

  <form>
    <label>Task Title</label>
    <input type="text" placeholder="Enter task title" [(ngModel)]="title">

    <label>Description</label>
    <textarea placeholder="Enter task description" [(ngModel)]="description"></textarea>

    <label>Priority</label>
    <select  [(ngModel)]="priority">
      <option>Low</option>
      <option>Medium</option>
      <option>High</option>
    </select>

    <label>Date</label>
    <input type="date" [(ngModel)]="date">

     <button type="button" (click)="addTask()">Add Task</button>
  </form>
</section>
